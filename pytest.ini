[pytest]
asyncio_mode = auto
bdd_features_base_dir = features/
testpaths = tests
addopts = -v
markers =
    backend: service-level backend scenarios (from .feature tags)
    service: service-level scenarios (no UI)
    e2e: end-to-end/UI scenarios (Cypress mirrors these; not run here)
    integration: tests that exercise the DB/service integration
    real_mongo: integration tests that require a real MongoDB (tests/real_mongo, env-gated)
