services:
  api:
    build: .
    container_name: reviews_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./features:/app/features
      - ./pytest.ini:/app/pytest.ini
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: reviews_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  # Real MongoDB for integration/regex/latency tests (PLAN §1.2). Start with: docker compose --profile test up -d mongo-test
  mongo-test:
    image: mongo:7
    container_name: reviews_mongo_test
    profiles: ["test"]
    ports:
      - "27018:27017"
    tmpfs:
      - /data/db
